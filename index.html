<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web NFC 테스트 페이지</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .btn:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn:active:not(:disabled) {
            background-color: #0056b3;
        }
        #output {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            text-align: left;
            font-size: 14px;
            min-height: 80px;
            white-space: pre-line;
            word-break: break-all;
            line-height: 1.6;
        }
        .warning {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Web NFC 테스트</h1>
    <p>안드로이드 앱 빌드 없이 브라우저에서 스마트폰 NFC 동작을 즉시 검증합니다.</p>
    
    <button id="scanBtn" class="btn">NFC 스캔 시작</button>
    
    <div id="output">버튼을 누르면 테스트가 시작됩니다.</div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const output = document.getElementById('output');

    // 1. 브라우저가 Web NFC를 지원하는지 환경 체크
    if (!('NDEFReader' in window)) {
        output.innerHTML = `<span class="warning">⚠️ Web NFC를 사용할 수 없는 환경입니다.</span>\n\n• 반드시 안드로이드 스마트폰의 <b>Chrome 브라우저</b>를 이용해 주세요.\n• 주소가 <b>https://</b> 로 시작하는 보안 연결 환경이어야만 작동합니다.`;
        scanBtn.disabled = true;
    }

    // 2. 스캔 시작 버튼 이벤트
    scanBtn.addEventListener('click', async () => {
        try {
            output.innerHTML = "🔄 NFC 리더기를 활성화하는 중...";
            
            // NDEFReader 인스턴스 생성 및 스캔 활성화 (폰에서 NFC 권한 요청 팝업이 뜸)
            const ndef = new NDEFReader();
            await ndef.scan();
            
            output.innerHTML = "📶 준비 완료!\n스마트폰 뒷면에 NFC 태그나 카드를 가까이 대세요.";

            // 3. NFC 카드가 감지되었을 때의 이벤트 핸들러
            ndef.addEventListener("reading", ({ message, serialNumber }) => {
                let resultText = `✅ <b>NFC 태그 감지 성공!</b>\n\n`;
                resultText += `<b>일련번호(UID):</b> ${serialNumber}\n`;
                resultText += `<b>레코드 수:</b> ${message.records.length}개\n\n`;

                // 태그 안에 저장된 데이터가 있다면 파싱해서 보여줌
                message.records.forEach((record, index) => {
                    resultText += `[레코드 ${index + 1}] 타입: ${record.recordType}\n`;
                    if (record.recordType === "text") {
                        const textDecoder = new TextDecoder(record.encoding);
                        resultText += ` ↳ 내용: ${textDecoder.decode(record.data)}\n`;
                    }
                });

                output.innerHTML = resultText;
            });

            // 읽기 실패 에러 처리
            ndef.addEventListener("readingerror", () => {
                output.innerHTML = "❌ NFC 태그를 읽는 데 실패했습니다. 올바른 태그 유형인지 확인하세요.";
            });

        } catch (error) {
            output.innerHTML = `<span class="warning">❌ 에러 발생: ${error.message}</span>\n\n사용자가 권한을 거부했거나 폰의 NFC 기능이 꺼져있을 수 있습니다.`;
            console.error(error);
        }
    });
</script>

</body>
</html>
