<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"
    />
    <title>요정공주 채하</title>

    <!-- 웹캠 제어 및 3D 렌더링을 즉시 구동해주는 오픈소스 AR 라이브러리 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      :root {
        /* 요정공주 채하를 위한 핑크/보라/골드 감성 테마 설정 */
        --sky: #ff8da1; /* 체리블라썸 핑크 */
        --sky-bright: #ffd0e0; /* 브라이트 로즈 핑크 */
        --glow: rgba(255, 141, 161, 0.5);
        --bg: #0e050b;
        --surface-3: #2c1525; /* 딥 바이올렛 */
        --text: #faeef3;
        --text-faint: #7d6171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        overflow: hidden;
        /* 터치 시 브라우저 기본 파란색 하이라이트 박스 제거 */
        -webkit-tap-highlight-color: transparent;
      }

      /* 상단 채하 테마 앱바 */
      .appbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        backdrop-filter: blur(16px) saturate(140%);
        background: rgba(22, 9, 18, 0.86);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        pointer-events: none;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1;
      }
      .logo-text b {
        color: var(--sky-bright);
        font-weight: 900;
        font-size: 19px;
        letter-spacing: 1px;
      }
      .logo-text small {
        font-weight: 700;
        color: var(--text-faint);
        font-size: 9px;
        letter-spacing: 3px;
      }
      .points-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--sky-bright);
        background: var(--surface-3);
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 800;
        border-radius: 20px;
        transition: background-color 0.3s ease;
      }
      .points-chip::before {
        content: "✨";
        margin-right: 2px;
      }

      /* 화면 중앙 스캔 안내 프레임 */
      .cam-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .cam-frame {
        position: relative;
        z-index: 2;
        width: min(64vw, 260px);
        aspect-ratio: 1;
        box-shadow: 0 0 0 200vmax rgba(0, 0, 0, 0.55);
      }
      .cam-frame::before {
        content: "";
        position: absolute;
        inset: 0;
        filter: drop-shadow(0 0 8px var(--glow));
        background:
          linear-gradient(var(--sky) 0 0) top left / 34px 3px,
          linear-gradient(var(--sky) 0 0) top left / 3px 34px,
          linear-gradient(var(--sky) 0 0) top right / 34px 3px,
          linear-gradient(var(--sky) 0 0) top right / 3px 34px,
          linear-gradient(var(--sky) 0 0) bottom left / 34px 3px,
          linear-gradient(var(--sky) 0 0) bottom left / 3px 34px,
          linear-gradient(var(--sky) 0 0) bottom right / 34px 3px,
          linear-gradient(var(--sky) 0 0) bottom right / 3px 34px;
        background-repeat: no-repeat;
      }
      .cam-frame::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 10%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--sky-bright),
          transparent
        );
        box-shadow: 0 0 14px 2px var(--glow);
        animation: camScan 2.2s ease-in-out infinite;
      }
      @keyframes camScan {
        0%,
        100% {
          top: 8%;
        }
        50% {
          top: 90%;
        }
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <!-- 상단 요정공주 채하 UI 레이아웃 -->
    <header class="appbar">
      <div class="logo-text">
        <b>요정공주 채하 AR</b>
      </div>
     
    </header>

    <!-- 가이드 HUD -->
    <div class="cam-overlay" id="scanner-ui">
      <div class="cam-frame"></div>
    </div>

    <!-- renderer 설정을 추가하여 모바일 환경 안티앨리어싱 강제 적용 -->
    <a-scene
      embedded
      renderer="antialias: true; colorManagement: true; precision: highp;"
      arjs="sourceType: webcam; 
            debugUIEnabled: false; 
            detectionMode: mono_and_matrix; 
            matrixCodeType: 3x3; 
            sourceWidth: 1280; 
            sourceHeight: 720; 
            displayWidth: 1280; 
            displayHeight: 720;"
    >
      <a-assets>
        <canvas id="cardCanvas" width="512" height="712"></canvas>
        <canvas id="leftCanvas" width="350" height="500"></canvas>
        <canvas id="rightCanvas" width="350" height="500"></canvas>
      </a-assets>

      <!-- 부드러운 매트 질감을 위해 고르게 분산되는 부드러운 음영 조명 설정 -->
      <a-entity
        light="type: ambient; color: #ffffff; intensity: 0.8;"
      ></a-entity>
      <a-entity
        light="type: directional; color: #ffffff; intensity: 0.7;"
        position="1.5 4 2"
      ></a-entity>

      <!-- 히로(Hiro) 마커 감지 노드 -->
      <a-marker preset="hiro" id="ar-marker">
        <a-entity id="unfold-group">
          <!-- [1] 중앙 메인 카드 -->
          <a-plane
            id="center-card"
            position="0 0.2 0"
            rotation="-90 0 0"
            width="2.8"
            height="3.92"
            material="src: #cardCanvas; transparent: true;"
          ></a-plane>

          <!-- [2] 좌측 스탯 정보 패널 -->
          <a-plane
            id="left-panel"
            position="0 0.05 0"
            rotation="-90 0 0"
            width="1.96"
            height="2.8"
            material="src: #leftCanvas; transparent: true; opacity: 0;"
          ></a-plane>

          <!-- [3] 우측 트로피 정보 패널 -->
          <a-plane
            id="right-panel"
            position="0 0.05 0"
            rotation="-90 0 0"
            width="1.96"
            height="2.8"
            material="src: #rightCanvas; transparent: true; opacity: 0;"
          ></a-plane>
        </a-entity>
      </a-marker>

      <!-- 메인 카메라 노드 -->
      <a-entity
        camera="fov: 60; active: true;"
        position="0 0 0"
        id="main-camera"
      ></a-entity>
    </a-scene>

    <script>
      const drawToCanvas = (id, drawFn) => {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        drawFn(ctx, canvas.width, canvas.height);
      };

      // 1. 중앙 요정공주 채하 카드 텍스처 그리기
      drawToCanvas("cardCanvas", (ctx, w, h) => {
        ctx.fillStyle = "#1e0c18"; // 어두운 핑크바이올렛 배경
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1"; // 핑크 테두리
        ctx.lineWidth = 14;
        ctx.strokeRect(20, 20, w - 40, h - 40);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 90px sans-serif";
        ctx.fillText("👑", 60, 150); // 왕관 심볼
        ctx.font = "bold 55px sans-serif";
        ctx.fillText("채하", 60, 230); // 한글 이름
        ctx.font = "bold 20px sans-serif";
        ctx.fillStyle = "#7d6171";
        ctx.fillText("요정공주 / 로열 등급", 60, 275); // 한글 등급 정보

        // 프레임 박스 (일러스트 영역)
        ctx.strokeStyle = "rgba(255, 141, 161, 0.4)";
        ctx.lineWidth = 5;
        ctx.strokeRect(40, 320, w - 80, 330);
      });

      // 2. 왼쪽 프로필 패널 텍스처 그리기
      drawToCanvas("leftCanvas", (ctx, w, h) => {
        ctx.fillStyle = "rgba(30, 12, 24, 0.95)";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1";
        ctx.lineWidth = 8;
        ctx.strokeRect(15, 15, w - 30, h - 30);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("요정 프로필", 35, 70);

        ctx.fillStyle = "#faeef3";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("신분: 요정공주", 35, 150);
        ctx.fillText("소속: 요정나라", 35, 200);
        ctx.fillText("마법: 사랑과 행복의 마법", 35, 250);

        ctx.fillStyle = "#ffd0e0";
        ctx.fillText("마력 충전량", 35, 340);
        ctx.fillStyle = "#ff8da1";
        ctx.fillRect(35, 370, 240, 24); // 마력 게이지
      });

      // 3. 오른쪽 스펠 패널 텍스처 그리기
      drawToCanvas("rightCanvas", (ctx, w, h) => {
        ctx.fillStyle = "rgba(30, 12, 24, 0.95)";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1";
        ctx.lineWidth = 8;
        ctx.strokeRect(15, 15, w - 30, h - 30);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("보유 마법", 35, 70);

        ctx.fillStyle = "#faeef3";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("💖 달콤한 하트 공격", 35, 150);
        ctx.fillText("✨ 반짝이는 요정 가루", 35, 210);
        ctx.fillText("👑 요정나라의 지배자", 35, 270);
      });

      const marker = document.getElementById("ar-marker");
      const leftPanel = document.getElementById("left-panel");
      const rightPanel = document.getElementById("right-panel");
      const centerCard = document.getElementById("center-card");
      const scannerUI = document.getElementById("scanner-ui");
      const statusBadge = document.getElementById("status-badge");
      const mainCamera = document.getElementById("main-camera");

      let isTracking = false;
      let animProgress = 0.0;

      // 활성화된 하트 메쉬 배열
      const activeHearts = [];

      // 요정나라 풍선 색상 세팅 (매끄러운 파스텔 톤)
      const heartColors = [
        "#ff4b72", // 체리 로즈
        "#ff8da1", // 러블리 핑크
        "#ffc0cb", // 베이비 파스텔 핑크
        "#ffe043", // 골드 옐로우
        "#d68eff", // 드림 바이올렛
      ];

      // --- [완벽한 해결책] 기본 정점 구조(Index)가 완벽히 살아있는 SphereGeometry 기반 캐싱 ---
      let cachedHeartGeometry = null;

      function getSharedHeartGeometry() {
        if (cachedHeartGeometry) return cachedHeartGeometry;

        // Three.js의 SphereGeometry는 처음부터 모든 정점이 매끄럽게 연결(Indexed)되어 있습니다.
        // 고해상도(48x48) 구체를 생성하여 성형하면 각짐 현상이 물리적으로 원천 차단됩니다.
        const geometry = new THREE.SphereGeometry(1, 48, 48);
        const pos = geometry.attributes.position;

        // 구체의 정점 인덱스를 훼손하지 않고, 위치 값만 부드럽게 태우빈 하트 공식으로 변형시킵니다.
        for (let i = 0; i < pos.count; i++) {
          const x_s = pos.getX(i);
          const y_s = pos.getY(i);
          const z_s = pos.getZ(i);

          const len = Math.sqrt(x_s * x_s + y_s * y_s + z_s * z_s);
          const dx = x_s / (len || 1);
          const dy = y_s / (len || 1);
          const dz = z_s / (len || 1);

          // 태우빈 공식 3D 좌표 매핑
          const x0 = dx;
          const y0 = dz;
          const z0 = dy;

          const A = x0 * x0 + 2.25 * y0 * y0 + z0 * z0;
          const B = z0 * z0 * z0 * (x0 * x0 + 0.045 * y0 * y0);

          let low = 0.01;
          let high = 2.5;
          let r = 1.0;

          for (let iter = 0; iter < 24; iter++) {
            r = (low + high) / 2;
            const r2 = r * r;
            const val = Math.pow(r2 * A - 1, 3) - B * Math.pow(r, 5);
            if (val > 0) {
              high = r;
            } else {
              low = r;
            }
          }

          const balloonScale = 0.18;
          pos.setXYZ(
            i,
            dx * r * balloonScale,
            dy * r * balloonScale,
            dz * r * balloonScale,
          );
        }

        // 구부러진 하트 표면 전체에 대해 한 치의 경계선도 없이 흘러가는 부드러운 법선 계산
        geometry.computeVertexNormals();

        cachedHeartGeometry = geometry;
        return geometry;
      }

      marker.addEventListener("markerFound", () => {
        isTracking = true;
        scannerUI.style.display = "none";
        statusBadge.innerText = "마법 터치! ✨";
        statusBadge.style.background = "#ff4b72";
      });

      marker.addEventListener("markerLost", () => {
        isTracking = false;
        setTimeout(() => {
          if (!isTracking) {
            scannerUI.style.display = "flex";
            statusBadge.innerText = "터치해봐! 💖";
            statusBadge.style.background = "var(--surface-3)";
          }
        }, 300);
      });

      // 터치 시 각짐 없는 완벽한 실크 매트 3D 하트 벌룬 발사
      function spawnMagicHeartAtClick(e) {
        if (e.clientY < 65) return; // 헤더 가드

        const sceneEl = document.querySelector("a-scene");
        const scene3D = sceneEl.object3D;
        const camera = mainCamera.getObject3D("camera");
        if (!camera || !scene3D) return;

        const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
        const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;

        const vec = new THREE.Vector3(ndcX, ndcY, 0.5);
        vec.unproject(camera);

        const camPos = new THREE.Vector3();
        camera.getWorldPosition(camPos);

        const dir = vec.clone().sub(camPos).normalize();
        const spawnDistance = 0.7;
        const spawnWorldPos = camPos
          .clone()
          .add(dir.clone().multiplyScalar(spawnDistance));

        const randomColor =
          heartColors[Math.floor(Math.random() * heartColors.length)];

        // 완벽하게 부드러운 구체 기반 지오메트리 사용
        const geometry = getSharedHeartGeometry();

        // [광택 제거 & 100% 불투명]
        // MeshPhongMaterial 대신 반사 하이라이트가 아예 존재하지 않는 MeshLambertMaterial 사용
        // 투명도(transparent: false)로 설정하여 속이 완벽하게 비치지 않는 단단한 풍선 구현
        const material = new THREE.MeshLambertMaterial({
          color: new THREE.Color(randomColor),
          transparent: false, // 투명도 제거 -> 완전 불투명!
          side: THREE.DoubleSide,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(spawnWorldPos);

        mesh.rotation.set(
          Math.random() * Math.PI * 2,
          Math.random() * Math.PI * 2,
          Math.random() * Math.PI * 2,
        );

        scene3D.add(mesh);

        const speed = 4.4;
        const vx = dir.x * speed + (Math.random() - 0.5) * 0.12;
        const vy = dir.y * speed + (Math.random() - 0.5) * 0.12;
        const vz = dir.z * speed + (Math.random() - 0.5) * 0.12;

        activeHearts.push({
          mesh: mesh,
          vx: vx,
          vy: vy,
          vz: vz,
          rvx: (Math.random() - 0.5) * 2.5,
          rvy: (Math.random() - 0.5) * 2.5,
          rvz: (Math.random() - 0.5) * 2.5,
          life: 1.0,
          decay: Math.random() * 0.3 + 0.45,
        });
      }

      window.addEventListener("pointerdown", (e) => {
        spawnMagicHeartAtClick(e);
      });

      let lastTime = performance.now();

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        if (isTracking) {
          animProgress += (1.0 - animProgress) * 0.08;
        } else {
          animProgress += (0.0 - animProgress) * 0.15;
        }

        if (leftPanel && rightPanel && centerCard) {
          leftPanel.setAttribute("position", `${-2.6 * animProgress} 0.05 0`);
          rightPanel.setAttribute("position", `${2.6 * animProgress} 0.05 0`);

          centerCard.setAttribute(
            "position",
            `0 ${0.2 + 0.3 * animProgress} 0`,
          );
          leftPanel.setAttribute(
            "position",
            `${-2.6 * animProgress} ${0.05 + 0.4 * animProgress} 0`,
          );
          rightPanel.setAttribute(
            "position",
            `${2.6 * animProgress} ${0.05 + 0.4 * animProgress} 0`,
          );

          leftPanel.setAttribute(
            "material",
            `src: #leftCanvas; transparent: true; opacity: ${animProgress}`,
          );
          rightPanel.setAttribute(
            "material",
            `src: #rightCanvas; transparent: true; opacity: ${animProgress}`,
          );
        }

        // --- 마법 풍선 하트 프레임별 위치 및 축소 소멸 루프 ---
        for (let i = activeHearts.length - 1; i >= 0; i--) {
          const h = activeHearts[i];
          h.life -= h.decay * dt;

          if (h.life <= 0) {
            if (h.mesh.parent) {
              h.mesh.parent.remove(h.mesh);
            }
            h.mesh.material.dispose();
            activeHearts.splice(i, 1);
            continue;
          }

          h.vx *= 0.96;
          h.vy *= 0.96;
          h.vz *= 0.96;

          h.mesh.position.x += h.vx * dt;
          h.mesh.position.y += h.vy * dt;
          h.mesh.position.z += h.vz * dt;

          h.mesh.rotation.x += h.rvx * dt;
          h.mesh.rotation.y += h.rvy * dt;
          h.mesh.rotation.z += h.rvz * dt;

          // 수명(life)에 맞게 크기가 자연스럽게 쪼그라들며(Shrink) 소멸하여 투명 연산 없이 깔끔한 연출 완성
          const currentScale = h.life * 1.5;
          h.mesh.scale.set(currentScale, currentScale, currentScale);
        }
      }

      animate();
    </script>
  </body>
</html>
