<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"
    />
    <title>요정공주 채하</title>

    <!-- 웹캠 제어 및 3D 렌더링을 즉시 구동해주는 오픈소스 AR 라이브러리 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      :root {
        /* 요정공주 채하를 위한 핑크/보라/골드 감성 테마 설정 */
        --sky: #ff8da1; /* 체리블라썸 핑크 */
        --sky-bright: #ffd0e0; /* 브라이트 로즈 핑크 */
        --glow: rgba(255, 141, 161, 0.5);
        --bg: #0e050b;
        --surface-3: #2c1525; /* 딥 바이올렛 */
        --text: #faeef3;
        --text-faint: #7d6171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        overflow: hidden;
        /* 터치 시 브라우저 기본 파란색 하이라이트 박스 제거 */
        -webkit-tap-highlight-color: transparent;
      }

      /* 상단 채하 테마 앱바 */
      .appbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        backdrop-filter: blur(16px) saturate(140%);
        background: rgba(22, 9, 18, 0.86);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        pointer-events: none;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1;
      }
      .logo-text b {
        color: var(--sky-bright);
        font-weight: 900;
        font-size: 19px;
        letter-spacing: 1px;
      }
      .logo-text small {
        font-weight: 700;
        color: var(--text-faint);
        font-size: 9px;
        letter-spacing: 3px;
      }
      .points-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--sky-bright);
        background: var(--surface-3);
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 800;
        border-radius: 20px;
        transition: background-color 0.3s ease;
      }
      .points-chip::before {
        content: "✨";
        margin-right: 2px;
      }

      /* 화면 중앙 스캔 안내 프레임 */
      .cam-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .cam-frame {
        position: relative;
        z-index: 2;
        width: min(64vw, 260px);
        aspect-ratio: 1;
        box-shadow: 0 0 0 200vmax rgba(0, 0, 0, 0.55);
      }
      .cam-frame::before {
        content: "";
        position: absolute;
        inset: 0;
        filter: drop-shadow(0 0 8px var(--glow));
        background:
          linear-gradient(var(--sky) 0 0) top left / 34px 3px,
          linear-gradient(var(--sky) 0 0) top left / 3px 34px,
          linear-gradient(var(--sky) 0 0) top right / 34px 3px,
          linear-gradient(var(--sky) 0 0) top right / 3px 34px,
          linear-gradient(var(--sky) 0 0) bottom left / 34px 3px,
          linear-gradient(var(--sky) 0 0) bottom left / 3px 34px,
          linear-gradient(var(--sky) 0 0) bottom right / 34px 3px,
          linear-gradient(var(--sky) 0 0) bottom right / 3px 34px;
        background-repeat: no-repeat;
      }
      .cam-frame::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 10%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--sky-bright),
          transparent
        );
        box-shadow: 0 0 14px 2px var(--glow);
        animation: camScan 2.2s ease-in-out infinite;
      }
      @keyframes camScan {
        0%,
        100% {
          top: 8%;
        }
        50% {
          top: 90%;
        }
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <!-- 상단 요정공주 채하 UI 레이아웃 -->
    <header class="appbar">
      <div class="logo-text">
        <b>요정공주 채하 AR</b>
        <small>요정나라 카드 전개 데모 (3D 마법 터치)</small>
      </div>
      <div class="points-chip" id="status-badge">터치해봐! 💖</div>
    </header>

    <!-- 가이드 HUD -->
    <div class="cam-overlay" id="scanner-ui">
      <div class="cam-frame"></div>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; 
            debugUIEnabled: false; 
            detectionMode: mono_and_matrix; 
            matrixCodeType: 3x3; 
            sourceWidth: 1280; 
            sourceHeight: 720; 
            displayWidth: 1280; 
            displayHeight: 720;"
    >
      <a-assets>
        <canvas id="cardCanvas" width="512" height="712"></canvas>
        <canvas id="leftCanvas" width="350" height="500"></canvas>
        <canvas id="rightCanvas" width="350" height="500"></canvas>
      </a-assets>

      <!-- 입체 3D 디테일을 드라마틱하게 연출하기 위한 조명 추가 -->
      <a-entity
        light="type: ambient; color: #ffffff; intensity: 0.7;"
      ></a-entity>
      <a-entity
        light="type: directional; color: #ffffff; intensity: 0.9;"
        position="2 4 3"
      ></a-entity>

      <!-- 히로(Hiro) 마커 감지 노드 -->
      <a-marker preset="hiro" id="ar-marker">
        <a-entity id="unfold-group">
          <!-- [1] 중앙 메인 카드 -->
          <a-plane
            id="center-card"
            position="0 0.2 0"
            rotation="-90 0 0"
            width="2.8"
            height="3.92"
            material="src: #cardCanvas; transparent: true;"
          ></a-plane>

          <!-- [2] 좌측 스탯 정보 패널 -->
          <a-plane
            id="left-panel"
            position="0 0.05 0"
            rotation="-90 0 0"
            width="1.96"
            height="2.8"
            material="src: #leftCanvas; transparent: true; opacity: 0;"
          ></a-plane>

          <!-- [3] 우측 트로피 정보 패널 -->
          <a-plane
            id="right-panel"
            position="0 0.05 0"
            rotation="-90 0 0"
            width="1.96"
            height="2.8"
            material="src: #rightCanvas; transparent: true; opacity: 0;"
          ></a-plane>
        </a-entity>
      </a-marker>

      <!-- 메인 카메라 노드 -->
      <a-entity
        camera="fov: 60; active: true;"
        position="0 0 0"
        id="main-camera"
      ></a-entity>
    </a-scene>

    <script>
      const drawToCanvas = (id, drawFn) => {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        drawFn(ctx, canvas.width, canvas.height);
      };

      // 1. 중앙 요정공주 채하 카드 텍스처 그리기
      drawToCanvas("cardCanvas", (ctx, w, h) => {
        ctx.fillStyle = "#1e0c18"; // 어두운 핑크바이올렛 배경
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1"; // 핑크 테두리
        ctx.lineWidth = 14;
        ctx.strokeRect(20, 20, w - 40, h - 40);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 90px sans-serif";
        ctx.fillText("👑", 60, 150); // 왕관 심볼
        ctx.font = "bold 55px sans-serif";
        ctx.fillText("채하", 60, 230); // 한글 이름
        ctx.font = "bold 20px sans-serif";
        ctx.fillStyle = "#7d6171";
        ctx.fillText("요정공주 / 로열 등급", 60, 275); // 한글 등급 정보

        // 프레임 박스 (일러스트 영역)
        ctx.strokeStyle = "rgba(255, 141, 161, 0.4)";
        ctx.lineWidth = 5;
        ctx.strokeRect(40, 320, w - 80, 330);
      });

      // 2. 왼쪽 프로필 패널 텍스처 그리기
      drawToCanvas("leftCanvas", (ctx, w, h) => {
        ctx.fillStyle = "rgba(30, 12, 24, 0.95)";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1";
        ctx.lineWidth = 8;
        ctx.strokeRect(15, 15, w - 30, h - 30);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("요정 프로필", 35, 70);

        ctx.fillStyle = "#faeef3";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("신분: 요정공주", 35, 150);
        ctx.fillText("소속: 요정나라", 35, 200);
        ctx.fillText("마법: 사랑과 행복의 마법", 35, 250);

        ctx.fillStyle = "#ffd0e0";
        ctx.fillText("마력 충전량", 35, 340);
        ctx.fillStyle = "#ff8da1";
        ctx.fillRect(35, 370, 240, 24); // 마력 게이지
      });

      // 3. 오른쪽 스펠 패널 텍스처 그리기
      drawToCanvas("rightCanvas", (ctx, w, h) => {
        ctx.fillStyle = "rgba(30, 12, 24, 0.95)";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#ff8da1";
        ctx.lineWidth = 8;
        ctx.strokeRect(15, 15, w - 30, h - 30);

        ctx.fillStyle = "#ffd0e0";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("보유 마법", 35, 70);

        ctx.fillStyle = "#faeef3";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("💖 달콤한 하트 공격", 35, 150);
        ctx.fillText("✨ 반짝이는 요정 가루", 35, 210);
        ctx.fillText("👑 요정나라의 지배자", 35, 270);
      });

      const marker = document.getElementById("ar-marker");
      const leftPanel = document.getElementById("left-panel");
      const rightPanel = document.getElementById("right-panel");
      const centerCard = document.getElementById("center-card");
      const scannerUI = document.getElementById("scanner-ui");
      const statusBadge = document.getElementById("status-badge");
      const mainCamera = document.getElementById("main-camera");

      let isTracking = false;
      let animProgress = 0.0;

      // 활성화된 3D 하트 파티클 배열 (Three.js 메쉬를 직접 보관)
      const activeHearts = [];

      // 요정나라 파스텔 톤 색상들
      const heartColors = [
        "#ff4b72", // 체리 로즈
        "#ff8da1", // 파스텔 핑크
        "#ffd0e0", // 오로라 핑크
        "#ffe066", // 요정 가루 골드
        "#e8a7ff", // 신비로운 퍼플
        "#5cd6ff", // 에메랄드 블루
      ];

      // --- [최적화 핵심] 전역 메모리에 단 하나의 하트 지오메트리 캐싱 ---
      let cachedHeartGeometry = null;

      function getSharedHeartGeometry() {
        if (cachedHeartGeometry) return cachedHeartGeometry;

        const shape = new THREE.Shape();
        shape.moveTo(0, -0.3);
        shape.bezierCurveTo(-0.2, -0.3, -0.5, -0.1, -0.5, 0.15);
        shape.bezierCurveTo(-0.5, 0.4, -0.25, 0.5, 0, 0.25);
        shape.bezierCurveTo(0.25, 0.5, 0.5, 0.4, 0.5, 0.15);
        shape.bezierCurveTo(0.5, -0.1, 0.2, -0.3, 0, -0.3);

        const extrudeSettings = {
          depth: 0.1, // 하트 두께감 최적화
          bevelEnabled: true,
          bevelSegments: 2, // 부드러움 단계를 5에서 2로 줄여 삼각형 연산 대폭 절감!
          steps: 1,
          bevelSize: 0.03,
          bevelThickness: 0.03,
        };

        const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geometry.center(); // 자전축 센터링
        cachedHeartGeometry = geometry;
        return geometry;
      }

      marker.addEventListener("markerFound", () => {
        isTracking = true;
        scannerUI.style.display = "none";
        statusBadge.innerText = "마법 터치! ✨";
        statusBadge.style.background = "#ff4b72";
      });

      marker.addEventListener("markerLost", () => {
        isTracking = false;
        setTimeout(() => {
          if (!isTracking) {
            scannerUI.style.display = "flex";
            statusBadge.innerText = "터치해봐! 💖";
            statusBadge.style.background = "var(--surface-3)";
          }
        }, 300);
      });

      // 단 하나의 3D 입체 하트를 터치한 손가락 끝 좌표에서 쏘아 올리는 최적화 함수
      function spawnMagicHeartAtClick(e) {
        if (e.clientY < 65) return; // 상단 헤더 영역 차단

        const sceneEl = document.querySelector("a-scene");
        const scene3D = sceneEl.object3D; // 가벼운 Pure Three.js 씬 루트 확보
        const camera = mainCamera.getObject3D("camera");
        if (!camera || !scene3D) return;

        // 1. 스크린 터치 좌표를 3D 공간 NDC 좌표로 매핑
        const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
        const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;

        const vec = new THREE.Vector3(ndcX, ndcY, 0.5);
        vec.unproject(camera);

        const camPos = new THREE.Vector3();
        camera.getWorldPosition(camPos);

        // 2. 발사 방향 계산 및 월드 생성 위치 지정 (카메라 앞 0.7m)
        const dir = vec.clone().sub(camPos).normalize();
        const spawnDistance = 0.7;
        const spawnWorldPos = camPos
          .clone()
          .add(dir.clone().multiplyScalar(spawnDistance));

        const randomColor =
          heartColors[Math.floor(Math.random() * heartColors.length)];

        // 3. 지오메트리 재활용 및 캔디 유광 재질(MeshPhongMaterial) 동적 생성
        const geometry = getSharedHeartGeometry();

        // MeshStandardMaterial 대신 모바일 연산이 훨씬 가벼운 Phong 재질 사용!
        const material = new THREE.MeshPhongMaterial({
          color: new THREE.Color(randomColor),
          shininess: 90, // 플라스틱 완구 같은 이쁜 반사광
          specular: 0xffffff,
          transparent: true,
          opacity: 1.0,
          side: THREE.DoubleSide,
          depthWrite: false, // 반투명 중첩 렌더링 렉 최소화
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(spawnWorldPos);

        // 랜덤 자전 각도 주기
        mesh.rotation.set(
          Math.random() * Math.PI * 2,
          Math.random() * Math.PI * 2,
          Math.random() * Math.PI * 2,
        );

        // 4. [최적화 핵심] A-Frame HTML 태그를 거치지 않고 Three.js 씬에 직접 메쉬 추가 (DOM 부하 Zero)
        scene3D.add(mesh);

        // 5. 발사 힘 벡터 설정 (앞쪽 깊숙이 슈팅)
        const speed = 4.5;
        const vx = dir.x * speed + (Math.random() - 0.5) * 0.2;
        const vy = dir.y * speed + (Math.random() - 0.5) * 0.2;
        const vz = dir.z * speed + (Math.random() - 0.5) * 0.2;

        // 6. 업데이트 처리를 위한 정보 보관 (A-Frame 속성 문자열 직렬화를 제거하여 고성능 확보)
        activeHearts.push({
          mesh: mesh,
          vx: vx,
          vy: vy,
          vz: vz,
          rvx: (Math.random() - 0.5) * 3.5, // 3D 자전 속도 (Radian 단위 직결)
          rvy: (Math.random() - 0.5) * 3.5,
          rvz: (Math.random() - 0.5) * 3.5,
          life: 1.0,
          decay: Math.random() * 0.35 + 0.4, // 수명 시간 (약 1.5초~2초 유지)
        });
      }

      // 모바일 멀티 터치 문제를 완벽하게 회복한 포인터 다운 이벤트 (딱 한 번 클릭에 한 개 발사)
      window.addEventListener("pointerdown", (e) => {
        spawnMagicHeartAtClick(e);
      });

      let lastTime = performance.now();

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        // 마커 감지 카드 전개 처리
        if (isTracking) {
          animProgress += (1.0 - animProgress) * 0.08;
        } else {
          animProgress += (0.0 - animProgress) * 0.15;
        }

        if (leftPanel && rightPanel && centerCard) {
          leftPanel.setAttribute("position", `${-2.6 * animProgress} 0.05 0`);
          rightPanel.setAttribute("position", `${2.6 * animProgress} 0.05 0`);

          centerCard.setAttribute(
            "position",
            `0 ${0.2 + 0.3 * animProgress} 0`,
          );
          leftPanel.setAttribute(
            "position",
            `${-2.6 * animProgress} ${0.05 + 0.4 * animProgress} 0`,
          );
          rightPanel.setAttribute(
            "position",
            `${2.6 * animProgress} ${0.05 + 0.4 * animProgress} 0`,
          );

          leftPanel.setAttribute(
            "material",
            `src: #leftCanvas; transparent: true; opacity: ${animProgress}`,
          );
          rightPanel.setAttribute(
            "material",
            `src: #rightCanvas; transparent: true; opacity: ${animProgress}`,
          );
        }

        // --- [최적화 핵심] 초고속 Three.js 파티클 실시간 연산 루프 ---
        for (let i = activeHearts.length - 1; i >= 0; i--) {
          const h = activeHearts[i];
          h.life -= h.decay * dt;

          // 수명이 끝난 하트는 메모리 누수를 막기 위해 무조건 제거 및 메모리 소거(Dispose) 처리
          if (h.life <= 0) {
            if (h.mesh.parent) {
              h.mesh.parent.remove(h.mesh);
            }
            // GPU에 묶여있던 단일 머티리얼 메모리도 클리닝
            h.mesh.material.dispose();
            activeHearts.splice(i, 1);
            continue;
          }

          // 속도 감속 및 위치 전이
          h.vx *= 0.96;
          h.vy *= 0.96;
          h.vz *= 0.96;

          h.mesh.position.x += h.vx * dt;
          h.mesh.position.y += h.vy * dt;
          h.mesh.position.z += h.vz * dt;

          // 회전력 추가
          h.mesh.rotation.x += h.rvx * dt;
          h.mesh.rotation.y += h.rvy * dt;
          h.mesh.rotation.z += h.rvz * dt;

          // 디졸브(서서히 스케일 다운 및 투명화)
          const currentScale = h.life * 0.65;
          h.mesh.scale.set(currentScale, currentScale, currentScale);
          h.mesh.material.opacity = h.life;
        }
      }

      animate();
    </script>
  </body>
</html>
